name: safesteps
description: A gamified child protection app for children in Ghana.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  just_audio: ^0.9.36
  url_launcher: ^6.2.4
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_analytics: ^10.7.4
  lottie: ^3.0.0
  google_fonts: ^6.1.0
  uuid: ^4.3.3
  flutter_animate: ^4.5.0
  share_plus: ^12.0.2
  connectivity_plus: ^4.0.2
  flutter_blue_plus: ^2.0.1
  flutter_blue_plus_winrt: ^0.0.20
  supabase_flutter: ^2.12.4
  cupertino_icons: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/

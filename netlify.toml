[build]
  command = "git clone https://github.com/flutter/flutter.git --depth 1 --branch 3.41.9 && flutter/bin/flutter pub get && flutter/bin/flutter build web --release"
  publish = "build/web"

[build.environment]
  PATH = "/opt/build/repo/flutter/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
